services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cheqmate
      POSTGRES_USER: cheqmate
      POSTGRES_PASSWORD: cheqmate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cheqmate
      SPRING_DATASOURCE_USERNAME: cheqmate
      SPRING_DATASOURCE_PASSWORD: cheqmate

volumes:
  pgdata:
