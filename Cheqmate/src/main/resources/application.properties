spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cheqmate}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cheqmate}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cheqmate}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

cheqmate.cli=${CHEQMATE_CLI:false}
cheqmate.use-legacy-file-storage=${CHEQMATE_USE_LEGACY:false}
